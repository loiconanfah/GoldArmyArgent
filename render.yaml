services:
  - type: web
    name: goldarmy-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: static
    name: goldarmy-frontend
    env: static
    # CRITICAL: VITE_API_URL must point to the deployed backend, NOT localhost.
    # Without this, the production frontend calls http://localhost:8000 which
    # only exists on the developer's machine — causing 100% API failure for all
    # users not running the backend locally.
    buildCommand: cd frontend && npm install && VITE_API_URL=https://goldarmyai.com npm run build
    staticPublishPath: frontend/dist
    routes:
      - source: /*
        destination: /index.html
        type: rewrite
